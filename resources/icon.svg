<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="1024" height="1024" fill="#1a1a1a"/>

  <!-- Green glow effect -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7ed321;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:0" />
    </radialGradient>
  </defs>
  <circle cx="512" cy="512" r="400" fill="url(#glow)"/>

  <!-- HLG Logo - Much larger and centered -->
  <g transform="translate(512, 512) scale(2.8)">
    <!-- H letter - Green -->
    <g transform="translate(-140, 0)">
      <!-- Left vertical bar -->
      <path d="M -35,-80 L -35,80 L -15,80 L -15,85 L 5,85 L 5,80 L 15,80 L 15,-80 L 5,-80 L 5,-85 L -15,-85 L -15,-80 Z"
            fill="#7ed321" stroke="#5a9e18" stroke-width="2"/>
      <!-- Horizontal bar -->
      <path d="M -15,-10 L -15,10 L 55,10 L 55,-10 Z"
            fill="#7ed321" stroke="#5a9e18" stroke-width="2"/>
      <!-- Right vertical bar -->
      <path d="M 45,-80 L 45,80 L 55,80 L 55,85 L 75,85 L 75,80 L 85,80 L 85,-80 L 75,-80 L 75,-85 L 55,-85 L 55,-80 Z"
            fill="#7ed321" stroke="#5a9e18" stroke-width="2"/>

      <!-- 3D effect - darker edges -->
      <path d="M -35,-80 L -35,80 L -30,75 L -30,-75 Z" fill="#5a9e18" opacity="0.5"/>
      <path d="M 85,-80 L 85,80 L 80,75 L 80,-75 Z" fill="#2d4f0c" opacity="0.5"/>
    </g>

    <!-- L letter - Silver/White -->
    <g transform="translate(0, 0)">
      <!-- Vertical bar -->
      <path d="M -15,-80 L -15,60 L 5,60 L 5,65 L 65,65 L 65,80 L 75,80 L 75,55 L 5,55 L 5,-80 L -5,-80 L -5,-85 L -15,-85 Z"
            fill="#e8e8e8" stroke="#b0b0b0" stroke-width="2"/>

      <!-- 3D effect -->
      <path d="M -15,-80 L -15,60 L -10,55 L -10,-75 Z" fill="#ffffff" opacity="0.6"/>
      <path d="M 5,55 L 75,55 L 70,50 L 5,50 Z" fill="#c0c0c0" opacity="0.5"/>
    </g>

    <!-- G letter - Silver/White with green accent -->
    <g transform="translate(140, 0)">
      <!-- Outer curve -->
      <path d="M -60,-80 Q -85,-80 -85,-55 L -85,55 Q -85,80 -60,80 L 40,80 Q 65,80 65,55 L 65,0 L 15,0 L 15,20 L 45,20 L 45,55 Q 45,60 40,60 L -60,60 Q -65,60 -65,55 L -65,-55 Q -65,-60 -60,-60 L 40,-60 Q 45,-60 45,-55 L 45,-30 L 65,-30 L 65,-55 Q 65,-80 40,-80 Z"
            fill="#e8e8e8" stroke="#b0b0b0" stroke-width="2"/>

      <!-- Inner green accent -->
      <path d="M 15,0 L 15,20 L 45,20 L 45,0 Z" fill="#7ed321" opacity="0.3"/>

      <!-- 3D effect -->
      <path d="M -85,-55 L -85,55 Q -85,80 -60,80 L -55,75 Q -75,75 -75,55 L -75,-55 Q -75,-75 -55,-75 L -60,-80 Q -85,-80 -85,-55 Z"
            fill="#ffffff" opacity="0.6"/>
    </g>
  </g>

  <!-- Subtle border -->
  <rect width="1024" height="1024" fill="none" stroke="#333333" stroke-width="4"/>
</svg>
