<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="description" content="Quản lý vườn lan chuyên nghiệp" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Orchid Farm" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Orchid Farm</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Bẫy lỗi khởi động: nếu app crash trước/trong khi React mount,
      // hiện lỗi ra màn hình thay vì để trắng bóc (ErrorBoundary React
      // không bắt được lỗi xảy ra trước khi React sống).
      (function () {
        var shown = false;
        function showFatal(msg) {
          if (shown) return;
          shown = true;
          var root = document.getElementById('root');
          if (!root || root.childElementCount > 0) return; // React đã mount -> bỏ qua
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:system-ui,sans-serif;background:#f0fdf4">' +
            '<div style="background:#fff;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);padding:28px;max-width:340px;text-align:center">' +
            '<div style="font-size:40px;margin-bottom:12px">🌿</div>' +
            '<h1 style="font-size:18px;font-weight:700;color:#1f2937;margin:0 0 8px">Không khởi động được</h1>' +
            '<p style="font-size:13px;color:#6b7280;margin:0 0 12px">Ứng dụng gặp lỗi khi mở. Vui lòng chụp màn hình này gửi hỗ trợ.</p>' +
            '<pre style="font-size:11px;color:#dc2626;background:#fef2f2;border-radius:8px;padding:10px;text-align:left;white-space:pre-wrap;word-break:break-word;margin:0 0 14px">' +
            String(msg).replace(/[<>&]/g, function (c) { return { '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]; }) +
            '</pre>' +
            '<button onclick="location.reload()" style="background:#16a34a;color:#fff;border:0;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px">Thử lại</button>' +
            '</div></div>';
        }
        window.addEventListener('error', function (e) {
          showFatal((e.error && e.error.stack) || e.message || 'Lỗi không xác định');
        });
        window.addEventListener('unhandledrejection', function (e) {
          showFatal((e.reason && (e.reason.stack || e.reason.message)) || e.reason || 'Promise bị từ chối');
        });
        // Nếu sau 8s mà React vẫn chưa mount gì -> nhiều khả năng bundle không chạy
        setTimeout(function () {
          showFatal('App không phản hồi sau 8 giây. Có thể tệp JS không tải được.');
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
